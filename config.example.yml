# omp-legion example configuration
#
# Copy the parts you need into your Oh-My-Pi plugin settings (project or user
# scope) under the "legion" key. Every field below is optional — anything you
# omit falls back to the defaults in src/domain/constants.ts. This file is
# documentation, not something Legion reads directly.

legion:
  # Per-role model policy. The role name is whatever you tag a sub-task with
  # (e.g. "coder", "reviewer", "tester") when calling legion_dispatch, or
  # whatever your decomposition step assigns.
  modelMap:
    coder:
      # Which model(s) this role may run on. With strategy "self-consistency"
      # (the default), only the first/strongest model is used — sampled N
      # times. With strategy "diverse", the dispatcher cycles through all of
      # them across the ensemble.
      models:
        - "anthropic/claude-fable-5"
        - "openai-codex/gpt-5.6-luna"
      strategy: self-consistency # "self-consistency" | "diverse"
      ensembleSize: 3 # 1-16, how many attempts this role gets per sub-task

    reviewer:
      # Example of deliberate multi-model diversity: two genuinely different
      # models cross-checking the same sub-task, per spec §5's "decorrelated
      # failure" reasoning — not a blanket "spread across everything free".
      models:
        - "anthropic/claude-fable-5"
        - "openai-codex/gpt-5.6-luna"
      strategy: diverse
      ensembleSize: 2

  # HOTL governance thresholds. Crossing any one of these escalates the task
  # to a non-blocking human decision (approve / reject / edit) instead of
  # returning the synthesized answer directly.
  hotl:
    confidenceFloor: 0.6 # escalate if majority-cluster confidence < this
    disagreementThreshold: 0.4 # escalate if disagreement > this
    costCeiling: 100000 # escalate if summed expert token cost > this

  # Default ensemble size for any role not listed in modelMap above.
  defaultEnsembleSize: 3

  # Embedding provider used for semantic-clustering-aware majority voting
  # (spec §6). Tried in order: host model registry, host Mnemopi subprocess,
  # then this Ollama endpoint. Only reached if neither host tier is available.
  # If none of the three are reachable, Legion falls back to Rouge-L text
  # similarity and surfaces a one-time degraded-mode warning — it never
  # silently pretends a hash-based vector is a real embedding.
  embedding:
    baseUrl: "http://127.0.0.1:11434"
    model: "nomic-embed-text"
    # apiKey: "..."   # only needed for a non-local/self-hosted Ollama instance
